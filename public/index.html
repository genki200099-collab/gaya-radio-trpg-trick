<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>GAYAラジTRPGトリテ Online</title>
<style>
:root{--navy:#0f3762;--blue:#2488d1;--red:#e94545;--green:#2da567;--yellow:#f2c94c;--muted:#64748b;--line:#d7e3ef}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;background:radial-gradient(circle at 18% 0%,rgba(36,136,209,.16),transparent 32%),linear-gradient(180deg,#f7fbff,#fff8e7);color:#172033;overflow-x:hidden}
button,input,select{font:inherit}button{cursor:pointer}.shell{max-width:1280px;margin:0 auto;padding:12px}.hero{position:sticky;top:0;z-index:20;background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:0 0 20px 20px;padding:10px;box-shadow:0 5px 16px rgba(15,55,98,.08)}
.title{display:flex;align-items:center;gap:9px}.mic{width:36px;height:36px;border-radius:13px;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:22px}h1{margin:0;font-size:22px;line-height:1.05;color:var(--navy)}.sub{margin:4px 0 0;font-size:12px;color:var(--muted);font-weight:800}
.status{display:flex;gap:6px;overflow-x:auto;margin-top:8px}.pill{white-space:nowrap;border-radius:999px;background:#f5f9ff;border:1px solid var(--line);padding:5px 9px;font-size:11px;font-weight:900;color:#334155}
.panel{background:rgba(255,255,255,.94);border:1px solid var(--line);border-radius:20px;padding:12px;box-shadow:0 8px 20px rgba(15,55,98,.06);min-width:0}.panel h2{margin:0 0 9px;font-size:15px;color:var(--navy)}.grid{display:grid;gap:10px}.grid2{grid-template-columns:1fr 1fr}.btn{border:0;border-radius:14px;background:var(--navy);color:#fff;padding:10px 14px;font-weight:1000;box-shadow:0 8px 18px rgba(15,55,98,.16)}.btn.sub{background:#f5f9ff;color:var(--navy);border:1px solid var(--line);box-shadow:none}.btn:disabled{opacity:.5}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.note{font-size:12px;line-height:1.55;color:#475569;font-weight:800}
input,select{width:100%;border:1px solid var(--line);border-radius:12px;padding:9px;background:#fff}.twocol{display:grid;grid-template-columns:1fr 120px;gap:8px}label{font-size:11px;font-weight:900;color:#475569}
.cast{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:10px 0}.cast-card{border:1px solid var(--line);border-radius:15px;overflow:hidden;background:#fff;text-align:center;font-size:10px;font-weight:1000;color:var(--navy)}.cast-card img{width:100%;height:78px;object-fit:cover;display:block}.cast-card span{display:block;padding:5px 2px}
.players{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.player{position:relative;border:2px solid var(--line);border-radius:18px;background:#fff;padding:8px;min-height:118px}.player.active{border-color:var(--red);box-shadow:0 0 0 4px rgba(233,69,69,.12)}.player.win{border-color:var(--green)}.ptop{display:flex;gap:7px;align-items:center}.avatar{width:56px;height:64px;border-radius:16px;object-fit:cover;border:3px solid #fff;box-shadow:0 5px 12px rgba(15,55,98,.14)}.pname{font-size:13px;font-weight:1000;color:var(--navy);line-height:1.15}.role{font-size:10px;font-weight:900;color:#64748b}.pstat{display:flex;justify-content:space-between;align-items:end;margin-top:8px}.score{font-size:22px;font-weight:1000;color:var(--navy)}.mini{font-size:10px;font-weight:900;color:#64748b;text-align:right}
.game-top{display:grid;grid-template-columns:1.25fr .75fr;gap:10px}.game-main{display:grid;grid-template-columns:minmax(0,1.45fr) minmax(340px,.85fr);gap:10px;margin-top:10px}.table{position:relative;min-height:430px;border:2px solid #c99548;border-radius:22px;padding:10px;background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.72),rgba(255,255,255,0) 24%),linear-gradient(145deg,#fff2c9,#f5dca3)}
.slot{position:absolute;width:31%;min-height:98px;border:1px solid var(--line);border-radius:17px;background:#fff;padding:7px;text-align:center;box-shadow:0 5px 13px rgba(15,55,98,.08)}.slot.top{left:50%;top:10px;transform:translateX(-50%)}.slot.right{right:10px;top:50%;transform:translateY(-50%)}.slot.bottom{left:50%;bottom:10px;transform:translateX(-50%)}.slot.left{left:10px;top:50%;transform:translateY(-50%)}.slot.next{box-shadow:0 0 0 4px rgba(233,69,69,.14)}.slot.winner{box-shadow:0 0 0 4px rgba(45,165,103,.18);border-color:var(--green)}.slotname{font-size:10px;font-weight:1000;color:var(--navy)}.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:78px;height:78px;border-radius:50%;background:#fff;display:grid;place-items:center;text-align:center;font-size:11px;font-weight:1000;color:var(--navy);box-shadow:0 8px 18px rgba(15,55,98,.08)}.se{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);z-index:5;background:var(--green);color:#fff;border-radius:999px;padding:8px 16px;font-size:26px;font-weight:1000;box-shadow:0 12px 28px rgba(22,163,74,.28)}
.card{width:70px;height:98px;border:2px solid #cfd8e3;border-radius:12px;background:#fff;display:inline-grid;place-items:center;position:relative;margin:2px;font-weight:1000;box-shadow:0 8px 16px rgba(11,34,64,.16)}.card.H{color:#e94545}.card.S{color:#2488d1}.card.D{color:#d99b00}.card.C{color:#2da567}.card .num{font-size:30px;line-height:1}.card .mark{font-size:24px}.smallcard{width:44px;height:60px;border-radius:9px}.smallcard .num{font-size:20px}.smallcard .mark{font-size:16px}
.hand{display:flex;gap:8px;flex-wrap:wrap}.hand .card{flex:0 0 72px}.hand .card.newdraw{box-shadow:0 0 0 3px rgba(22,163,74,.18),0 10px 18px rgba(22,163,74,.18);animation:newCardIn .8s cubic-bezier(.18,1.15,.28,1) both}.hand .card.newdraw:before{content:"+1";position:absolute;right:-4px;top:-7px;z-index:3;padding:2px 6px;font-size:10px;background:#16a34a;color:#fff;border-radius:999px}
.turn{position:sticky;top:92px;max-height:calc(100vh - 108px);overflow:auto}.turnmain{display:flex;gap:9px;align-items:center}.turnmain img{width:58px;height:68px;border-radius:17px;object-fit:cover}.turntitle{font-size:18px;font-weight:1000;color:var(--navy)}.turnhelp{font-size:11px;font-weight:900;color:#64748b}.mobile-tip{display:inline-flex;gap:5px;border-radius:999px;background:#fff8e7;border:1px solid #f0d18a;color:#8a5a00;font-size:10px;font-weight:1000;padding:5px 8px;margin:8px 0}.mobile-tip.draw-tip{background:#ecfdf3;border-color:#bfe8ce;color:#166534}.mobile-tip.draw-tip:before{content:"+1";background:#16a34a;color:#fff;border-radius:999px;padding:1px 5px}
.speech{margin:8px 0;display:flex;gap:8px;align-items:center;border:2px solid var(--blue);border-radius:17px;background:#fff;padding:8px}.speech img{width:44px;height:52px;border-radius:14px;object-fit:cover}.speechname{font-size:11px;font-weight:1000;color:var(--navy)}.speechtext{font-size:12px;font-weight:900;color:#334155}.ai{margin-top:8px;border-radius:14px;background:#f5f9ff;border:1px solid var(--line);padding:8px;font-size:12px;font-weight:900;color:#334155}.pause{margin-top:8px;border-radius:14px;background:#fff8e7;border:1px solid #f0d18a;padding:8px;font-size:12px;font-weight:900}.bar{height:6px;background:#f4dfaa;border-radius:999px;overflow:hidden;margin-top:6px}.bar span{display:block;height:100%;background:var(--green);animation:bar 5s linear forwards}
@keyframes bar{from{width:0}to{width:100%}}@keyframes newCardIn{0%{opacity:0;transform:translateY(-34px) rotate(-6deg) scale(.86)}65%{opacity:1;transform:translateY(3px) rotate(2deg) scale(1.03)}100%{opacity:1;transform:translateY(0) rotate(0) scale(1)}}
.log{max-height:220px;overflow:auto}.log div{font-size:11px;font-weight:800;color:#334155;border-bottom:1px solid #eef2f7;padding:5px 2px}.scoreline{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:14px;background:#fff;padding:7px 9px;margin-bottom:6px}.rank{font-weight:1000;color:var(--navy)}.scorepts{font-weight:1000;color:var(--green)}
.result-card{border-color:#f2c94c;background:linear-gradient(180deg,#fffaf0,#fff)}.gain-list{display:grid;gap:7px}.gain-row{display:grid;grid-template-columns:1fr auto;gap:8px;border:1px solid var(--line);border-radius:14px;background:#fff;padding:8px}.gain-name{font-weight:1000;color:var(--navy)}.gain-sub{font-size:10px;font-weight:900;color:#64748b}.gain-point{font-weight:1000;color:#166534}
@media(max-width:899px){.shell{padding:8px 8px 128px}.hero{margin:-8px -8px 8px;padding:8px}.title h1{font-size:21px}.game-top,.game-main{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}.panel{border-radius:18px;padding:8px}.players{display:flex;overflow-x:auto}.player{flex:0 0 154px}.table{min-height:300px}.slot{width:34%;min-height:84px;padding:6px}.center{width:58px;height:58px}.turn{position:sticky;bottom:6px;top:auto;max-height:58vh}.hand{overflow-x:auto;flex-wrap:nowrap}.hand .card{min-width:64px}.card{width:64px;height:92px}.cast-card img{height:62px}.twocol{grid-template-columns:1fr 104px}.log{max-height:118px}}

.reconnect-box{
  border:1px solid #f0d18a;
  background:#fff8e7;
  border-radius:16px;
  padding:9px;
  margin-top:10px;
}
.reconnect-box .row{margin-top:7px}
.net-warn{
  border:1px solid #f0d18a;
  background:#fff8e7;
  color:#8a5a00;
  border-radius:999px;
  padding:5px 8px;
  font-size:11px;
  font-weight:1000;
}

.player.cpu{
  border-color:#7c3aed;
  background:
    radial-gradient(circle at 92% 8%, rgba(124,58,237,.14), transparent 28%),
    linear-gradient(180deg,#f8f5ff,#fff);
}
.player.cpu .role{
  color:#5b21b6;
}
.player.cpu:after{
  content:"CPU";
  position:absolute;
  right:8px;
  bottom:8px;
  background:#7c3aed;
  color:#fff;
  border-radius:999px;
  padding:3px 7px;
  font-size:10px;
  font-weight:1000;
}
.btn.cpuadd{
  background:#7c3aed;
  color:#fff;
  border-color:#7c3aed;
}
.btn.cpuremove{
  background:#fff;
  color:#7c3aed;
  border-color:#c4b5fd;
}
.cpu-help{
  margin-top:8px;
  border:1px solid #c4b5fd;
  background:#f8f5ff;
  color:#4c1d95;
  border-radius:14px;
  padding:8px;
  font-size:12px;
  font-weight:900;
  line-height:1.45;
}
@media(max-width:899px){
  .player.cpu:after{right:7px;bottom:7px;font-size:9px}
}

.home-card{
  max-width:760px;
  margin:0 auto;
}
.home-actions{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px;
}
.home-actions .btn{
  width:100%;
}
.home-mini{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin:8px 0 0;
}
.home-mini span{
  border:1px solid var(--line);
  background:#f5f9ff;
  color:#334155;
  border-radius:999px;
  padding:5px 8px;
  font-size:11px;
  font-weight:900;
}
.reconnect-box{
  padding:8px;
}
.reconnect-box .note{
  margin:0;
}
@media(max-width:899px){
  .home-actions{
    grid-template-columns:1fr;
  }
}

.cpu-bubbles{
  display:grid;
  gap:6px;
  margin-top:8px;
}
.cpu-bubble{
  display:grid;
  grid-template-columns:34px 1fr;
  gap:7px;
  align-items:start;
  border:1px solid var(--line);
  background:#fff;
  border-radius:14px;
  padding:7px;
  box-shadow:0 4px 10px rgba(15,55,98,.05);
  animation:bubbleIn .22s ease-out both;
}
.cpu-bubble img{
  width:34px;
  height:40px;
  border-radius:11px;
  object-fit:cover;
  border:2px solid #fff;
  box-shadow:0 3px 8px rgba(15,55,98,.12);
}
.cpu-bubble .bname{
  font-size:10px;
  font-weight:1000;
  color:var(--navy);
  line-height:1.1;
}
.cpu-bubble .btext{
  margin-top:2px;
  font-size:11px;
  font-weight:900;
  line-height:1.35;
  color:#334155;
}
.cpu-bubble.k{border-color:#f2c94c;background:#fffdf2}
.cpu-bubble.p{border-color:#ff9a9a;background:#fff5f5}
.cpu-bubble.n{border-color:#9ed3ff;background:#f1f8ff}
.cpu-bubble.y{border-color:#9fe7bf;background:#f3fff8}
.cpu-bubble.k .bname{color:#8a5a00}
.cpu-bubble.p .bname{color:#a12626}
.cpu-bubble.n .bname{color:#0f5f96}
.cpu-bubble.y .bname{color:#166534}
.comment-mini{
  margin-top:6px;
  font-size:10px;
  font-weight:900;
  color:#64748b;
}
@keyframes bubbleIn{
  from{opacity:0;transform:translateY(4px)}
  to{opacity:1;transform:translateY(0)}
}
@media(max-width:899px){
  .cpu-bubbles{
    max-height:132px;
    overflow:auto;
  }
  .cpu-bubble{
    grid-template-columns:30px 1fr;
    padding:6px;
  }
  .cpu-bubble img{
    width:30px;
    height:36px;
  }
  .cpu-bubble .btext{
    font-size:10px;
  }
}
</style>
</head>

var SUITS=[{key:'H',mark:'♥',label:'赤'},{key:'S',mark:'♠',label:'青'},{key:'D',mark:'♦',label:'黄'},{key:'C',mark:'♣',label:'緑'}];
var ROLE_KEYS=['k','p','n','y'];
var state=null,ws=null,mySeat=null,roomCode='',message='',savedReconnect=null;
var REKEY='gaya_online_reconnect_v1';
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function byId(id){return document.getElementById(id);}
function saveReconnect(){
  try{
    if(state&&state.roomCode&&state.token!=null) localStorage.setItem(REKEY, JSON.stringify({room:state.roomCode,seat:state.seat,token:state.token}));
  }catch(e){}
}
function loadReconnect(){
  try{return JSON.parse(localStorage.getItem(REKEY)||'null');}catch(e){return null;}
}
function clearReconnect(){
  try{localStorage.removeItem(REKEY);}catch(e){}
}
function reconnectSaved(){
  var r=loadReconnect();
  if(!r){message='再接続情報なし';render();return;}
  connect(function(){send('reconnect',{room:r.room,seat:r.seat,token:r.token});});
}

function suit(k){for(var i=0;i<SUITS.length;i++)if(SUITS[i].key===k)return SUITS[i];return {mark:'?',label:k};}
function roleIndex(label){if(label==='きくぞう役')return 0;if(label==='ペグ役')return 1;if(label==='なかとー役')return 2;return 3;}
function send(type,data){if(ws&&ws.readyState===1)ws.send(JSON.stringify({type:type,data:data||{}}));}
function wsUrl(){var p=location.protocol==='https:'?'wss://':'ws://';return p+location.host;}
function connect(cb){if(ws&&ws.readyState===1){cb();return;}ws=new WebSocket(wsUrl());ws.onopen=function(){cb();};ws.onmessage=function(ev){var m;try{m=JSON.parse(ev.data);}catch(e){return;}if(m.type==='state'){state=m.data;mySeat=state.seat;roomCode=state.roomCode;message='';saveReconnect();render();}if(m.type==='errorMsg'){message=m.data;render();}};ws.onclose=function(){message='通信切断。再接続できます。';render();};}
function createRoom(){connect(function(){send('create',{name:byId('name').value});});}
function joinRoom(){connect(function(){var r=loadReconnect();send('join',{room:byId('room').value,seat:byId('seat').value,name:byId('name').value,token:r?r.token:''});});}
function shell(content){var g=state?state.game:null;var r=g?(g.round+1)+'/4':'未開始',d=g?g.deckCount+'枚':'-',t=g?g.trick.length+'/4':'-';byId('app').innerHTML='<div class="shell"><header class="hero"><div class="title"><div class="mic">🎙️</div><h1>GAYAラジTRPGトリテ Online</h1></div><p class="sub">部屋番号でオンライン対戦</p><div class="status"><span class="pill">部屋 '+esc(roomCode||'-')+'</span><span class="pill">R '+r+'</span><span class="pill">山札 '+d+'</span><span class="pill">場 '+t+'</span>'+(message?'<span class="net-warn">'+esc(message)+'</span>':'')+'</div></header>'+content+'</div>';}
function render(){if(!state){renderHome();return;}if(!state.game){renderLobby();return;}if(state.game.phase==='roundEnd'){renderRoundEnd();return;}if(state.game.phase==='gameEnd'){renderGameEnd();return;}renderGame();}
function renderHome(){var cast='<div class="cast">';for(var i=0;i<4;i++)cast+='<div class="cast-card"><img src="'+ROLES[i].img+'"><span>'+['きくぞう','ペグ','なかとー','ヤマ'][i]+'</span></div>';cast+='</div>';shell('<section class="panel home-card"><h2>オンライン対戦</h2>'+cast+'<div class="home-mini"><span>4人対戦</span><span>CPU追加OK</span><span>再接続対応</span></div><p class="note">部屋を作って番号を共有。人が足りない時は待機室でCPUを追加できます。</p><div class="twocol"><label>名前<input id="name" value="プレイヤー"></label><label>席<select id="seat"><option value="0">席1</option><option value="1">席2</option><option value="2">席3</option><option value="3">席4</option></select></label></div><div style="margin-top:8px"><label>部屋番号<input id="room" placeholder="例：ABCDE"></label></div><div class="home-actions"><button class="btn" onclick="createRoom()">部屋を作る</button><button class="btn sub" onclick="joinRoom()">部屋に入る</button></div><div class="reconnect-box"><div class="note">通信が切れたら同じ席に戻れます。</div><div class="row"><button class="btn sub" onclick="reconnectSaved()">再接続</button><button class="btn sub" onclick="clearReconnect();message=&quot;削除しました&quot;;render()">削除</button></div></div><p class="note">'+esc(message)+'</p></section>');}
function renderLobby(){var h='<section class="panel"><h2>待機室：'+esc(state.roomCode)+'</h2><p class="note">部屋番号を共有。空席はCPUで埋められます。</p><div class="cpu-help">ホストは空席にCPUを追加できます。</div><div class="players">';for(var i=0;i<4;i++){var p=state.players[i],ri=i,status=p.isCpu?'CPU':(p.connected?'参加中':'空席'),cls='player'+(p.isCpu?' cpu':'');h+='<div class="'+cls+'"><div class="ptop"><img class="avatar" src="'+ROLES[ri].img+'"><div><div class="pname">席'+(i+1)+' '+esc(p.name||'空席')+'</div><div class="role">'+status+'</div></div></div>';if(mySeat===state.hostSeat&&!p.connected&&!p.isCpu)h+='<div class="row" style="margin-top:8px"><button class="btn sub cpuadd" onclick="send(\'addCpu\',{seat:'+i+'})">CPU追加</button></div>';if(mySeat===state.hostSeat&&p.isCpu)h+='<div class="row" style="margin-top:8px"><button class="btn sub cpuremove" onclick="send(\'removeCpu\',{seat:'+i+'})">CPU解除</button></div>';h+='</div>';}h+='</div><div class="row" style="margin-top:10px"><button class="btn sub cpuadd" '+(mySeat===state.hostSeat?'':'disabled')+' onclick="send(\'fillCpu\')">CPUで埋める</button><button class="btn" '+(mySeat===state.hostSeat?'':'disabled')+' onclick="send(\'start\')">ゲーム開始</button><button class="btn sub" onclick="location.reload()">退出</button></div><p class="note">'+esc(message)+'</p></section>';shell(h);}
function playerHTML(){var g=state.game,h='<div class="players">';for(var i=0;i<4;i++){var p=g.players[i],ri=roleIndex(p.role),cls='player'+(p.isCpu?' cpu':'');if(i===g.currentSeat)cls+=' active';if(g.pending&&i===g.pending.winner)cls+=' win';h+='<div class="'+cls+'"><div class="ptop"><img class="avatar" src="'+ROLES[ri].img+'"><div><div class="pname">'+esc(p.name)+'</div><div class="role">'+p.role+(p.isCpu?' / CPU':(i===mySeat?' / あなた':''))+'</div></div></div><div class="pstat"><div class="score">'+p.score+'点</div><div class="mini">'+p.tricks+'T<br>手札 '+p.handCount+'</div></div></div>';}return h+'</div>';}
function scoreHTML(){var g=state.game,a=[];for(var i=0;i<4;i++)a.push({i:i,s:g.players[i].score,n:g.players[i].name});a.sort(function(x,y){return y.s-x.s;});var h='';for(i=0;i<a.length;i++)h+='<div class="scoreline"><span class="rank">'+(i+1)+'位 '+esc(a[i].n)+'</span><span class="scorepts">'+a[i].s+'点</span></div>';return h;}
function cardHTML(c,small){return '<span class="card '+c.suit+(small?' smallcard':'')+'"><span class="num">'+c.rank+'</span><span class="mark">'+suit(c.suit).mark+'</span></span>';}
function roleNameByKey(k){if(k==='k')return 'きくぞう';if(k==='p')return 'ペグ';if(k==='n')return 'なかとー';return 'ヤマ';}
function roleIndexByKey(k){if(k==='k')return 0;if(k==='p')return 1;if(k==='n')return 2;return 3;}
function cpuBubblesHTML(){
  var g=state.game;
  if(!g||!g.comments||!g.comments.length)return '';
  var h='<div class="cpu-bubbles">';
  for(var i=0;i<g.comments.length;i++){
    var c=g.comments[i],idx=roleIndexByKey(c.roleKey),p=g.players[c.seat];
    h+='<div class="cpu-bubble '+c.roleKey+'"><img src="'+ROLES[idx].img+'"><div><div class="bname">'+esc(roleNameByKey(c.roleKey))+' / '+esc(p?p.name:'CPU')+'</div><div class="btext">'+esc(c.text)+'</div></div></div>';
  }
  h+='</div>';
  return h;
}
function tableHTML(){var g=state.game,o=[];for(var i=0;i<4;i++)o.push((g.leadSeat+i)%4);var pos=['top','right','bottom','left'],lead=g.trick.length?suit(g.trick[0].card.suit):null,h='<div class="table">';if(g.phase==='trickPause')h+='<div class="se">GET!</div>';for(i=0;i<o.length;i++){var seat=o[i],p=g.players[seat],played=null;for(var j=0;j<g.trick.length;j++)if(g.trick[j].seat===seat)played=g.trick[j].card;var cls='slot '+pos[i];if(seat===g.currentSeat)cls+=' next';if(g.pending&&seat===g.pending.winner)cls+=' winner';h+='<div class="'+cls+'"><div class="slotname">'+esc(p.name)+'<br>'+p.role+'</div>'+(played?cardHTML(played,true):'<div class="note">未プレイ</div>')+'</div>';}h+='<div class="center">'+(lead?lead.mark+'<br>'+lead.label:'時計回り')+'</div></div>';if(g.phase==='trickPause')h+='<div class="pause">獲得確認中<div class="bar"><span></span></div></div>';return h;}
function speechHTML(){return '';}
function turnHTML(){var g=state.game,seat=g.currentSeat,p=g.players[mySeat],isMine=seat===mySeat,h='<div class="turn"><div class="turnmain"><img src="'+ROLES[roleIndex(p.role)].img+'"><div><div class="turntitle">'+(isMine?'あなたの手番':'待機中')+'</div><div class="turnhelp">'+(isMine?'カードをタップ。':'他プレイヤーの手番です。')+'</div></div></div>';if(g.phase==='trickPause')h+='<div class="ai">トリック獲得確認中。</div>';else if(!isMine)h+='<div class="ai">'+esc(g.players[seat].name)+'さんの手番です。'+(g.players[seat].isCpu?' CPU思考中':'')+'</div>';var last={};for(var i=0;i<g.lastDraw.length;i++)last[g.lastDraw[i].cardId]=true;if(g.players[mySeat].hand.length){h+='<div class="mobile-tip '+(g.lastDraw.length?'draw-tip':'')+'">'+(g.lastDraw.length?'補充完了':'手札')+'</div><div class="hand">';for(i=0;i<g.players[mySeat].hand.length;i++){var c=g.players[mySeat].hand[i],nd=last[c.id];h+='<button '+(isMine?'':'disabled')+' class="card '+c.suit+(nd?' newdraw':'')+'" onclick="send(\'play\',{cardId:\''+c.id+'\'})"><span class="num">'+c.rank+'</span><span class="mark">'+suit(c.suit).mark+'</span></button>';}h+='</div>';}h+='</div>';return h;}
function renderGame(){shell('<div class="game-top"><section class="panel"><h2>プレイヤー</h2>'+playerHTML()+'</section><section class="panel"><h2>スコア</h2>'+scoreHTML()+'</section></div><div class="game-main"><section class="panel"><h2>場のカード</h2>'+tableHTML()+cpuBubblesHTML()+'</section><section class="panel"><h2>手番</h2>'+turnHTML()+'</section></div><section class="panel" style="margin-top:10px"><h2>ログ</h2><div class="log">'+logHTML()+'</div></section>');}
function logHTML(){var h='',l=state.game.log;for(var i=0;i<l.length;i++)h+='<div>'+esc(l[i])+'</div>';return h;}
function renderRoundEnd(){var g=state.game,rr=g.results[g.results.length-1],h='<section class="panel result-card"><h2>ラウンド終了</h2><p class="note">'+esc(rr.desc)+'</p><div class="gain-list">';for(var i=0;i<4;i++)h+='<div class="gain-row"><div><div class="gain-name">'+esc(g.players[i].name)+'</div><div class="gain-sub">'+g.players[i].role+' / '+rr.tricks[i]+'T</div></div><div class="gain-point">+'+rr.gained[i]+'</div></div>';h+='</div><div style="margin-top:10px">'+scoreHTML()+'</div><div class="row" style="margin-top:10px"><button class="btn" onclick="send(\'nextRound\')">次へ</button></div></section>';shell(h);}
function renderGameEnd(){var g=state.game,n=[];for(var i=0;i<g.winnerSeats.length;i++)n.push(g.players[g.winnerSeats[i]].name);shell('<section class="panel result-card"><h2>ゲーム終了</h2><div style="font-size:26px;font-weight:1000;color:#0f3762">🏆 '+esc(n.join('・'))+'さんの勝利！</div><p class="note">4ラウンド終了。合計点トップが勝利。</p><div class="row"><button class="btn" onclick="send(\'again\')">待機室へ</button></div></section><section class="panel" style="margin-top:10px"><h2>最終スコア</h2>'+scoreHTML()+'</section>');}
render();
</script>
</body>
</html>
